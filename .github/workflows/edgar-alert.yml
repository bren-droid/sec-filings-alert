name: SEC Filings Checker (Every Minute)

on:
  schedule:
    - cron: "*/1 * * * *"   # corre cada minuto
  workflow_dispatch:       # te permite correrlo manualmente

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install feedparser python-dotenv


      - name: Run SEC filings checker
        env:
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_SENDER_PASSWORD: ${{ secrets.GMAIL_SENDER_PASSWORD }}
          GMAIL_RECEIVER_EMAIL: ${{ secrets.GMAIL_RECEIVER_EMAIL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }} # opcional
        run: |
          python src/check_filings.py

